services:
  server:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      TRUST_PROXY_HOPS: 1
    expose:
      - "5000"
    volumes:
      - private_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    security_opt:
      - no-new-privileges:true

volumes:
  private_uploads:
